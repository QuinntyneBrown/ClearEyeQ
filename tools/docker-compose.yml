services:
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cleareyeq-cosmos
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
    volumes:
      - cosmos-data:/data

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cleareyeq-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cleareyeq
      POSTGRES_PASSWORD: Dev_P@ssw0rd!
      POSTGRES_DB: cleareyeq
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cleareyeq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: cleareyeq-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cleareyeq-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: cleareyeq
      RABBITMQ_DEFAULT_PASS: Dev_P@ssw0rd!
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  cosmos-data:
  postgres-data:
  redis-data:
  azurite-data:
  rabbitmq-data:
